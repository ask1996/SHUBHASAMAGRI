# Production Profile - MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/shubhasamagridb?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET:ShubhaSamagriSuperSecretKeyForJWTTokenGeneration2024MustBe256BitsLong!!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://shubha-samagri.netlify.app}

# Logging
logging.level.com.shubhasamagri=INFO
logging.level.org.springframework.security=WARN
