spring.application.name=shubha-samagri
server.port=8080

# H2 In-Memory Database (Development)
spring.datasource.url=jdbc:h2:mem:shubhasamagridb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=ShubhaSamagriSuperSecretKeyForJWTTokenGeneration2024MustBe256BitsLong!!
app.jwt.expiration=86400000

# CORS - comma-separated allowed origins
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://shubha-samagri.netlify.app

# Logging
logging.level.com.shubhasamagri=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Disable SQL script initialization (data loaded via DataInitializer.java)
spring.sql.init.mode=never

# Chatbot service URL
chatbot.service.url=http://localhost:8001
